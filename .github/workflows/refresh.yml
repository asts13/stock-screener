name: Stock Data Refresh (11x daily)

on:
  schedule:
    - cron: '0 15 * * *'   # 00:00 KST
    - cron: '30 17 * * *'  # 02:30 KST
    - cron: '0 20 * * *'   # 05:00 KST
    - cron: '0 23 * * *'   # 08:00 KST
    - cron: '0 1 * * *'    # 10:00 KST
    - cron: '0 3 * * *'    # 12:00 KST
    - cron: '0 5 * * *'    # 14:00 KST
    - cron: '30 6 * * *'   # 15:30 KST
    - cron: '0 9 * * *'    # 18:00 KST
    - cron: '0 11 * * *'   # 20:00 KST
    - cron: '0 13 * * *'   # 22:00 KST
  workflow_dispatch:

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: 데이터 갱신
        env:
          KIS_APP_KEY:    ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: python jobs/scheduled_refresh.py

      - name: 결과 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "actions@users.noreply.github.com"
          # 스크리닝 결과 + 갱신 시각만 커밋 (개별 가격 파일 제외)
          git add data/result_kr.parquet data/result_us.parquet data/last_update.json 2>/dev/null || true
          git diff --staged --quiet \
            || (git commit -m "data: $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push)
